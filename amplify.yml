version: 1

backend:
  phases:
    build:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v # ← Confirm in logs (should show v20.x)
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID

frontend:
  phases:
    build:
      commands:
        - nvm install 20 # Ensure frontend also uses Node 20
        - nvm use 20
        - node -v
        - npm run build # This will also run "amplify:generate" via your package.json script
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
